<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invoice Creator</title>
    <link rel="stylesheet" href="invoiceCreatorCSS.css" />
</head>

<body>
    <h1 id="invoiceTitle" class="outsideText">Invoice Creator</h1>

    <div id="selectContainer">
        <label for="templateChooser" class="outsideText">Choose previous data:</label>
        <select id="templateChooser">
        </select>
    </div>

    <div id="invoiceContainers" class="relative">

        <div id="invoiceEditContainer" class="relative itemContainer">
            
            <div id="identifiers" class="relative">
            
                <div class="relative darkerBackground infoItem">

                    <input id="editClientOrganisation" class="infoChild" type="text" placeholder="Input Company Name..." />

                    <input id="editFAO" class="infoChild" type="text" placeholder="Input F.A.O..." />

                    <input id="editAddress" class="infoChild" type="text" placeholder="Input Address..." />

                    <input id="editTown" class="infoChild" type="text" placeholder="Input Town..." />

                    <input id="editPostCode" class="infoChild" type="text" placeholder="Input Post Code..." />

                </div>

                <div class="relative darkerBackground infoItem">
                    
                    <input id="editClientOrganisation" class="infoChild" type="text" placeholder="Input Company Name..." />
                    
                </div>
        
            </div>
        
        </div>

        <div id="invoicePreviewContainer" class="relative itemContainer">

            <div id="identifiers" class="relative">
            
                <div class="relative darkerBackground infoItem">

                    <h1 id="previewClientOrganisation" class="boldText" />

                    <h1 id="previewFAO" class="normalText" />

                    <h1 id="previewAddress" class="normalText"></h1>

                    <h1 id="previewTown" class="normalText"></h1>

                    <h1 id="previewPostCode" class="normalText"></h1>
                </div>

                <div class="relative darkerBackground infoItem">

                    <h1 id="previewClientOrganisation" class="boldText" />

                </div>
            
            </div>
        
        </div>

    </div>

    <script src="invoiceCreatorJS.js"></script>
</body>
</html>
